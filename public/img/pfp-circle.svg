<!-- Circular PFP — for Instagram, GMB profile, anywhere a round avatar gets rendered -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="SMPL circular profile picture">
  <defs>
    <linearGradient id="goldC" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="55%" stop-color="#D4A24A"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="vignetteC" cx="50%" cy="42%" r="75%">
      <stop offset="0%"  stop-color="#1A1A22"/>
      <stop offset="100%" stop-color="#08080C"/>
    </radialGradient>
    <clipPath id="circleClip"><circle cx="512" cy="512" r="512"/></clipPath>
  </defs>

  <g clip-path="url(#circleClip)">
    <rect width="1024" height="1024" fill="url(#vignetteC)"/>
    <!-- Gold accent ring -->
    <circle cx="512" cy="512" r="496" fill="none" stroke="url(#goldC)" stroke-width="4" opacity="0.55"/>
    <!-- Gold corner triangle -->
    <path d="M780 0 L1024 0 L1024 244 Z" fill="url(#goldC)"/>

    <!-- SMPL wordmark centred -->
    <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF" text-anchor="middle">
      <text x="512" y="510" font-size="240" letter-spacing="-6">SMPL</text>
    </g>
    <g font-family="Inter, Arial, sans-serif" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">
      <text x="512" y="600" font-size="40" font-weight="700">SHOW MASTERS</text>
      <text x="512" y="642" font-size="24" font-weight="500" fill="#D7D7DD" letter-spacing="18">PRODUCTION LOGISTICS</text>
    </g>
  </g>
</svg>
