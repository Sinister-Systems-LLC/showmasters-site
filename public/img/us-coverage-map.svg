<!-- US coverage map for where.html. Stylized silhouette + brand-color shading +
     hub stars (offices Orlando + Fort Worth) + operational-hub stars (other states
     with regular work) + city-served dots + legend. Designed at 1200x740 viewBox. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" role="img" aria-label="Show Masters US coverage map">
  <defs>
    <linearGradient id="usG" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="55%" stop-color="#D4A24A"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <linearGradient id="usGsoft" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#D4A24A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9C7126" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="bloomMap" cx="50%" cy="0%" r="70%">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFE8B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background bloom from top center -->
  <rect width="1200" height="740" fill="#0A0A0F"/>
  <ellipse cx="600" cy="60" rx="700" ry="200" fill="url(#bloomMap)"/>

  <!-- Title -->
