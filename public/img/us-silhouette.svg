<svg class="smpl-silhouette" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Show Masters US service area map">
  <title>Show Masters US service area</title>
  <defs>
    <radialGradient id="usGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(212,162,74,0.18)"/>
      <stop offset="100%" stop-color="rgba(212,162,74,0)"/>
    </radialGradient>
    <linearGradient id="usFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#2A2519"/>
      <stop offset="100%" stop-color="#18141A"/>
    </linearGradient>
    <radialGradient id="beacon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFE8B8"/>
      <stop offset="50%" stop-color="#D4A24A"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </radialGradient>
    <filter id="goldBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>
  <style>
    .smpl-silhouette .us-glow      { fill: url(#usGlow); }
    .smpl-silhouette .us-shape     { fill: url(#usFill); stroke: rgba(212,162,74,0.55); stroke-width: 1.4; stroke-linejoin: round; }
    .smpl-silhouette .conn-line    { stroke: rgba(212,162,74,0.20); stroke-width: 1; stroke-dasharray: 3 6; }
    .smpl-silhouette .hub-pulse    { fill: rgba(212,162,74,0.5); transform-origin: center; }
    .smpl-silhouette .hub-pulse.is-hq { fill: rgba(255,232,184,0.7); }
    .smpl-silhouette .hub-marker   { cursor: pointer; }
    .smpl-silhouette .hub-dot      { fill: url(#beacon); }
    .smpl-silhouette .hub-label    { font: 800 9px "Inter", system-ui, sans-serif; fill: #FFE8B8; letter-spacing: 2px; pointer-events: none; text-transform: uppercase; }
    .smpl-silhouette .hub-city     { font: 700 7px "JetBrains Mono", monospace; fill: rgba(212,162,74,0.7); letter-spacing: 1.5px; pointer-events: none; text-transform: uppercase; }
    @keyframes hub-pulse-anim { 0%,100% { transform: scale(0.6); opacity: 0.9; } 100% { transform: scale(3); opacity: 0; } }
    @keyframes hub-pulse-anim2 { 0% { transform: scale(0.6); opacity: 0.9; } 100% { transform: scale(3); opacity: 0; } }
    .smpl-silhouette .hub-pulse    { animation: hub-pulse-anim2 2.4s ease-out infinite; }
    .smpl-silhouette .hub-pulse.is-hq { animation-duration: 2s; }
    @media (prefers-reduced-motion: reduce) { .smpl-silhouette .hub-pulse { animation: none; opacity: 0.35; } }
  </style>
  <ellipse class="us-glow" cx="500" cy="320" rx="480" ry="220" />
  <path class="us-shape" d="M 142 188 L 140 168 L 154 156 L 178 152 L 198 154 L 215 158 L 230 158 L 248 154 L 268 156 L 288 158 L 308 156 L 328 154 L 348 152 L 372 152 L 396 154 L 420 156 L 444 154 L 470 152 L 498 150 L 528 148 L 560 148 L 596 150 L 632 152 L 668 154 L 700 156 L 730 158 L 758 162 L 782 168 L 800 178 L 814 188 L 824 200 L 832 214 L 836 230 L 838 246 L 836 262 L 832 276 L 826 290 L 816 302 L 808 314 L 802 326 L 800 340 L 802 354 L 808 366 L 814 378 L 818 392 L 820 408 L 820 424 L 818 440 L 814 454 L 808 466 L 800 476 L 790 484 L 778 490 L 766 494 L 752 496 L 738 494 L 724 490 L 712 482 L 702 470 L 694 458 L 688 446 L 684 432 L 680 418 L 674 406 L 666 396 L 656 388 L 644 382 L 630 380 L 614 380 L 596 382 L 578 384 L 560 386 L 542 386 L 524 384 L 508 380 L 492 374 L 478 366 L 464 358 L 450 350 L 436 344 L 422 340 L 406 338 L 390 338 L 374 340 L 358 342 L 342 344 L 326 344 L 310 340 L 296 334 L 282 326 L 268 318 L 254 308 L 240 298 L 226 286 L 214 274 L 202 260 L 192 246 L 184 230 L 178 214 L 172 198 L 162 188 L 142 188 Z" />
  <path class="us-shape" d="M 736 462 L 748 466 L 760 470 L 770 478 L 776 490 L 778 504 L 776 516 L 770 526 L 762 532 L 752 534 L 742 530 L 736 522 L 732 510 L 730 498 L 728 484 L 730 472 L 736 462 Z" />
  <line class="conn-line" x1="770" y1="500" x2="668" y2="416" />
  <line class="conn-line" x1="770" y1="500" x2="632" y2="354" />
  <line class="conn-line" x1="770" y1="500" x2="576" y2="472" />
  <line class="conn-line" x1="520" y1="410" x2="576" y2="472" />
  <line class="conn-line" x1="520" y1="410" x2="668" y2="416" />
  <line class="conn-line" x1="520" y1="410" x2="376" y2="304" />
  <line class="conn-line" x1="520" y1="410" x2="228" y2="318" />
  <line class="conn-line" x1="520" y1="410" x2="186" y2="348" />
  <line class="conn-line" x1="770" y1="500" x2="520" y2="410" />
  <g class="hub-marker">
    <title>Los Angeles</title>
    <circle class="hub-pulse" cx="186" cy="348" r="8" />
    <circle class="hub-dot" cx="186" cy="348" r="3.5" filter="url(#goldBlur)" />
    <circle class="hub-dot" cx="186" cy="348" r="2.1" />
    <text x="186" y="336" class="hub-city" text-anchor="middle">LA</text>
  </g>
  <g class="hub-marker">
    <title>Las Vegas</title>
    <circle class="hub-pulse" cx="228" cy="318" r="8" />
    <circle class="hub-dot" cx="228" cy="318" r="3.5" filter="url(#goldBlur)" />
    <circle class="hub-dot" cx="228" cy="318" r="2.1" />
    <text x="228" y="306" class="hub-city" text-anchor="middle">NV</text>
  </g>
  <g class="hub-marker">
    <title>Denver</title>
    <circle class="hub-pulse" cx="376" cy="304" r="8" />
    <circle class="hub-dot" cx="376" cy="304" r="3.5" filter="url(#goldBlur)" />
    <circle class="hub-dot" cx="376" cy="304" r="2.1" />
    <text x="376" y="292" class="hub-city" text-anchor="middle">CO</text>
  </g>
  <g class="hub-marker">
    <title>Nashville</title>
    <circle class="hub-pulse" cx="632" cy="354" r="8" />
    <circle class="hub-dot" cx="632" cy="354" r="3.5" filter="url(#goldBlur)" />
    <circle class="hub-dot" cx="632" cy="354" r="2.1" />
    <text x="632" y="342" class="hub-city" text-anchor="middle">TN</text>
  </g>
  <g class="hub-marker">
    <title>Atlanta</title>
    <circle class="hub-pulse" cx="668" cy="416" r="8" />
    <circle class="hub-dot" cx="668" cy="416" r="3.5" filter="url(#goldBlur)" />
    <circle class="hub-dot" cx="668" cy="416" r="2.1" />
    <text x="668" y="404" class="hub-city" text-anchor="middle">GA</text>
  </g>
  <g class="hub-marker">
    <title>New Orleans</title>
    <circle class="hub-pulse" cx="576" cy="472" r="8" />
    <circle class="hub-dot" cx="576" cy="472" r="3.5" filter="url(#goldBlur)" />
    <circle class="hub-dot" cx="576" cy="472" r="2.1" />
    <text x="576" y="460" class="hub-city" text-anchor="middle">LA</text>
  </g>
  <g class="hub-marker" data-hub="orlando">
    <title>Orlando</title>
    <circle class="hub-pulse is-hq" cx="770" cy="500" r="16" />
    <circle class="hub-dot" cx="770" cy="500" r="6" filter="url(#goldBlur)" />
    <circle class="hub-dot" cx="770" cy="500" r="3.5999999999999996" />
    <text x="770" y="530" class="hub-label" text-anchor="middle">ORLANDO HQ</text>
  </g>
  <g class="hub-marker" data-hub="dallas">
    <title>Dallas</title>
    <circle class="hub-pulse is-hq" cx="520" cy="410" r="16" />
    <circle class="hub-dot" cx="520" cy="410" r="6" filter="url(#goldBlur)" />
    <circle class="hub-dot" cx="520" cy="410" r="3.5999999999999996" />
    <text x="520" y="440" class="hub-label" text-anchor="middle">DALLAS HUB</text>
  </g>
</svg>