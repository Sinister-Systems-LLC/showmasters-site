<!-- Square PFP — 1024x1024. Use for Facebook page, LinkedIn company, X profile, GMB. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="SMPL profile picture">
  <defs>
    <linearGradient id="goldP" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="55%" stop-color="#D4A24A"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="38%" r="75%">
      <stop offset="0%"  stop-color="#1A1A22"/>
      <stop offset="100%" stop-color="#08080C"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <!-- Gold corner accent — full bleed top-right -->
  <path d="M768 0 L1024 0 L1024 256 Z" fill="url(#goldP)"/>
  <!-- Thin gold rule along the bottom -->
  <rect x="80" y="940" width="864" height="2" fill="url(#goldP)" opacity="0.7"/>

  <!-- SMPL wordmark -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="900" fill="#FFFFFF" text-anchor="middle">
    <text x="512" y="540" font-size="280" letter-spacing="-8">SMPL</text>
  </g>

  <!-- Tagline -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" fill="#FFFFFF" text-anchor="middle" letter-spacing="14">
    <text x="512" y="640" font-size="46" font-weight="700">SHOW MASTERS</text>
    <text x="512" y="690" font-size="28" font-weight="500" fill="#D7D7DD" letter-spacing="20">PRODUCTION LOGISTICS</text>
  </g>

  <!-- Footer caption -->
  <text x="512" y="980" text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600"
        letter-spacing="6" fill="#9D9DA8">ORLANDO &#xb7; DALLAS &#xb7; NATIONWIDE</text>
</svg>
